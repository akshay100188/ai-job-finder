sources:
  adzuna:   { enabled: false, country: in }   # needs ADZUNA_APP_ID/KEY in .env
  jooble:   { enabled: false }                # needs JOOBLE_KEY in .env
  remoteok: { enabled: true }
  himalayas: { enabled: true }
  remotive: { enabled: true }
  arbeitnow: { enabled: true }
  jobicy:   { enabled: true }
  wwr:      { enabled: true, categories: ["remote-jobs"] }
  jobspy:   { enabled: true, sites: [indeed, naukri, google, linkedin, glassdoor], results_wanted: 25 }

filter:
  recall_bias: true            # ambiguous gate -> let through
  location_aliases:            # hybrid acceptance list
    accept: ["noida", "greater noida"]
    reject: ["gurgaon", "gurugram"]
  recency_days: 30

scoring:
  skill_weights: {}            # optional per-skill weights; default 1.0
  domain_boost: 0.1            # domain keywords now come from your criteria, not this file
  title_boost: 0.3             # boost when the job's own title matches one of your searched titles
  domain_as_gate: false        # if true, a job with zero domain-keyword hits is gated out
  learner_min_labels: 40

tailoring:                     # Phase 3 only -- the only section that touches an LLM (BYOK)
  model_extract: "claude-haiku-4-5-20251001"     # cheaper model, JD requirement extraction
  model_rephrase: "claude-sonnet-4-6"            # capable model, honest bullet rephrasing
  include_tailored_summary: true
  output_formats: [docx, md]
  run_lint_llm_pass: true       # extra LLM fact-check pass on top of the deterministic lint

fx_rates_to_inr:               # offline, user-editable; pay gate compares in INR
  INR: 1.0
  USD: 86.0
  EUR: 93.0
  GBP: 108.0
